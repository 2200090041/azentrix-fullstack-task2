
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Task Calendar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>

body{
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    font-family:'Segoe UI',sans-serif;
}

/* HEADER */

.header{
    background:white;
    border-radius:20px;
    padding:25px;
    margin-top:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* CALENDAR */

#calendar{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    margin-bottom:25px;
}

/* STATS */

.stats-card{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.stats-card h2{
    font-weight:700;
}

/* MODAL */

.modal-content{
    border:none;
    border-radius:20px;
}

/* BUTTON */

.btn-dashboard{
    border-radius:30px;
    padding:8px 18px;
    font-weight:600;
}

</style>

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <div class="d-flex justify-content-between align-items-center">

            <div>

                <h2>
                    <i class="fa-solid fa-calendar-days"></i>
                    Task Calendar
                </h2>

                <p class="text-muted mb-0">
                    Manage project deadlines visually
                </p>

            </div>

            <div>

                <a href="/boards"
                   class="btn btn-outline-primary btn-dashboard me-2">

                    Boards

                </a>

                <a href="/dashboard"
                   class="btn btn-primary btn-dashboard">

                    Dashboard

                </a>

            </div>

        </div>

    </div>

    <!-- STATS -->

    <div class="row">

        <div class="col-md-4">

            <div class="stats-card">

                <h6>Total Tasks</h6>

                <h2 th:text="${#lists.size(tasks)}"></h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-card">

                <h6>Completed</h6>

                <h2 class="text-success"
                    th:text="${tasks.?[status=='DONE'].size()}">
                </h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stats-card">

                <h6>Pending</h6>

                <h2 class="text-primary"
                    th:text="${tasks.?[status!='DONE'].size()}">
                </h2>

            </div>

        </div>

    </div>

    <!-- CALENDAR -->

    <div id="calendar"></div>

</div>

<!-- MODAL -->

<div class="modal fade"
     id="taskModal"
     tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h4 id="modalTitle"
                    class="fw-bold text-primary">
                </h4>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <p id="modalDescription"></p>

                <hr>

                <p>
                    <strong>📅 Due Date:</strong>
                    <span id="modalDate"></span>
                </p>

                <p>
                    <strong>📊 Status:</strong>
                    <span id="modalStatus"></span>
                </p>

                <p>
                    <strong>👤 Assigned To:</strong>
                    <span id="modalUser"></span>
                </p>

            </div>

        </div>

    </div>

</div>

<script th:inline="javascript">

document.addEventListener('DOMContentLoaded', function() {

    let calendarEl = document.getElementById('calendar');

    let calendar = new FullCalendar.Calendar(calendarEl, {

        initialView: 'dayGridMonth',

        height: 650,

        dayMaxEvents: true,

        nowIndicator: true,

        events: [

            /*[# th:each="task : ${tasks}"]*/
            {
                title: '[[${task.title}]]',

                start: '[[${task.dueDate}]]',

                description: '[[${task.description}]]',

                status: '[[${task.status}]]',

                assigned: '[[${task.assignedUser != null ? task.assignedUser.name : "Unassigned"}]]',

                backgroundColor: '[[${task.status=="DONE" ? "#22c55e" : (task.status=="IN_PROGRESS" ? "#f59e0b" : "#ef4444")}]]',

                borderColor: '[[${task.status=="DONE" ? "#22c55e" : (task.status=="IN_PROGRESS" ? "#f59e0b" : "#ef4444")}]]',

                textColor: '#ffffff'
            },
            /*[/]*/

        ],

        eventClick: function(info) {

            document.getElementById('modalTitle').innerText =
                info.event.title;

            document.getElementById('modalDescription').innerText =
                info.event.extendedProps.description;

            document.getElementById('modalDate').innerText =
                info.event.start.toLocaleDateString();

            document.getElementById('modalStatus').innerText =
                info.event.extendedProps.status;

            document.getElementById('modalUser').innerText =
                info.event.extendedProps.assigned;

            new bootstrap.Modal(
                document.getElementById('taskModal')
            ).show();
        }

    });

    calendar.render();

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
