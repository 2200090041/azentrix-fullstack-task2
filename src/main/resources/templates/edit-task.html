<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Edit Task</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>Edit Task</h3>

        </div>

        <div class="card-body">

            <form action="/task/update"
                  method="post">

                <input type="hidden"
                       name="taskId"
                       th:value="${task.id}">

                <div class="mb-3">

                    <label>Title</label>

                    <input class="form-control"
                           name="title"
                           th:value="${task.title}">

                </div>

                <div class="mb-3">

                    <label>Description</label>

                    <textarea
                        class="form-control"
                        name="description"
                        th:text="${task.description}">
                    </textarea>

                </div>

                <div class="mb-3">

                    <label>Due Date</label>

                    <input type="date"
                           class="form-control"
                           name="dueDate"
                           th:value="${task.dueDate}">

                </div>

                <div class="mb-3">

                    <label>Priority</label>

                    <select class="form-select"
                            name="priority">

                        <option value="HIGH">HIGH</option>
                        <option value="MEDIUM">MEDIUM</option>
                        <option value="LOW">LOW</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label>Assign User</label>

                    <select class="form-select"
                            name="userId">

                        <option
                            th:each="user : ${users}"
                            th:value="${user.id}"
                            th:text="${user.name}">
                        </option>

                    </select>

                </div>

                <button class="btn btn-success">
                    Update Task
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
