<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Project Boards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#f4f7fc;
    font-family:'Inter',sans-serif;
    color:#1f2937;
}

/* TOPBAR */

.topbar{
    height:70px;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-size:22px;
    font-weight:700;
    color:#2563eb;
}

/* MAIN */

.main{
    padding:30px;
}

/* HERO */

.hero-banner{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    border-radius:22px;
    padding:35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

.hero-banner h1{
    font-size:32px;
    font-weight:700;
    margin-bottom:8px;
}

.hero-banner p{
    margin:0;
    opacity:.9;
}

.board-count{
    text-align:center;
}

.board-count h2{
    font-size:42px;
    font-weight:700;
    margin:0;
}

.board-count small{
    font-size:14px;
    opacity:.9;
}

/* CREATE BOX */

.create-box{
    background:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:30px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.create-box h5{
    font-weight:600;
    margin-bottom:15px;
}

/* FORM */

.form-control{
    height:50px;
    border-radius:12px;
}

.btn-create{
    height:50px;
    border-radius:12px;
    font-weight:600;
}

/* BOARD CARD */

.board-card{
    background:white;
    border-radius:20px;
    padding:25px;
    position:relative;
    overflow:hidden;
    height:100%;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:all .3s ease;
}

.board-card::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:5px;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
}

.board-card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.board-icon{
    font-size:48px;
}

.board-name{
    font-size:18px;
    font-weight:600;
    margin-top:12px;
    margin-bottom:15px;
}

.action-buttons{
    margin-top:20px;
}

/* EMPTY STATE */

.empty-state{
    text-align:center;
    padding:80px 20px;
}

.empty-state .icon{
    font-size:80px;
}

.empty-state h3{
    margin-top:15px;
    font-weight:600;
}

.empty-state p{
    color:#6b7280;
}

/* BUTTONS */

.btn-open{
    border-radius:10px;
    padding:8px 18px;
}

.btn-delete{
    border-radius:10px;
    padding:8px 18px;
}

/* MOBILE */

@media(max-width:768px){

    .hero-banner{
        flex-direction:column;
        text-align:center;
        gap:20px;
    }

    .main{
        padding:15px;
    }
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="logo">
        🚀 Mini Trello
    </div>

    <a href="/dashboard"
       class="btn btn-dark">
        Dashboard
    </a>

</div>

<!-- MAIN -->

<div class="main container">

    <!-- HERO -->

    <div class="hero-banner">

        <div>

            <h1>📋 Project Boards</h1>

            <p>
                Organize projects, manage tasks and track progress efficiently.
            </p>

        </div>

        <div class="board-count">

            <h2 th:text="${#lists.size(boards)}">
                0
            </h2>

            <small>Total Boards</small>

        </div>

    </div>

    <!-- CREATE BOARD -->

    <div class="create-box">

        <h5>Create New Board</h5>

        <form action="/board/create"
              method="post"
              class="row g-3">

            <div class="col-md-10">

                <input type="text"
                       name="boardName"
                       class="form-control"
                       placeholder="Enter board name..."
                       required>

            </div>

            <div class="col-md-2">

                <button class="btn btn-primary btn-create w-100">
                    + Create
                </button>

            </div>

        </form>

    </div>

    <!-- EMPTY STATE -->

    <div th:if="${#lists.isEmpty(boards)}"
         class="empty-state">

        <div class="icon">📂</div>

        <h3>No Boards Yet</h3>

        <p>
            Create your first project board to get started.
        </p>

    </div>

    <!-- BOARDS -->

    <div class="row g-4">

        <div class="col-lg-4 col-md-6"
             th:each="board : ${boards}">

            <div class="board-card">

                <div class="text-center">

                    <div class="board-icon">
                        📋
                    </div>

                    <div class="board-name"
                         th:text="${board.boardName}">
                    </div>

                    <p class="text-muted">
                        Manage tasks and collaborate with your team.
                    </p>

                    <div class="action-buttons">

                        <a th:href="@{/board/{id}(id=${board.id})}"
                           class="btn btn-primary btn-open">
                            Open Board
                        </a>

                        <form
                            th:action="@{/board/delete/{id}(id=${board.id})}"
                            method="post"
                            style="display:inline;">

                            <button
                                class="btn btn-outline-danger btn-delete"
                                onclick="return confirm('Delete this board?')">

                                Delete

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
