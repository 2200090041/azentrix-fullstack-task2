<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f6fb;">

<div class="container mt-5">

    <div class="card shadow border-0">

        <div class="card-body p-5">

            <h2 class="mb-4">
                Edit Profile
            </h2>

            <form action="/profile/update"
                  method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        th:value="${user.name}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        th:value="${user.email}"
                        required>

                </div>

                <button class="btn btn-success">
                    Save Changes
                </button>

                <a href="/profile"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
