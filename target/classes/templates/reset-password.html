<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.reset-card{
    width:500px;
    border:none;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logo{
    color:#0d6efd;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card reset-card p-4">

        <h2 class="text-center logo mb-4">
            Mini Trello
        </h2>

        <h4 class="text-center mb-4">
            Reset Password
        </h4>

        <form action="/reset-password"
              method="post">

            <input type="hidden"
                   name="token"
                   th:value="${token}">

            <div class="mb-3">

                <label class="form-label">
                    New Password
                </label>

                <input type="password"
                       name="newPassword"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Confirm Password
                </label>

                <input type="password"
                       name="confirmPassword"
                       class="form-control"
                       required>

            </div>

            <button class="btn btn-primary w-100">
                Reset Password
            </button>

        </form>

        <p class="text-success text-center mt-3"
           th:text="${success}">
        </p>

        <p class="text-danger text-center mt-3"
           th:text="${error}">
        </p>

    </div>

</div>

</body>
</html>
