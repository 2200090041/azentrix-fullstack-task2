<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Change Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:#f4f7fc;
    font-family:'Segoe UI',sans-serif;
}

/* CARD */

.password-card{
    max-width:650px;
    margin:50px auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

/* HEADER */

.card-header-custom{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:25px;
    text-align:center;
}

.card-header-custom h3{
    margin:0;
    font-weight:600;
}

/* BODY */

.card-body-custom{
    padding:30px;
}

.form-control{
    height:50px;
    border-radius:12px;
}

.input-group-text{
    border-radius:12px 0 0 12px;
}

/* BUTTON */

.btn-save{
    background:#2563eb;
    border:none;
    height:50px;
    border-radius:12px;
    font-weight:600;
}

.btn-save:hover{
    background:#1d4ed8;
}

/* SECURITY BOX */

.security-box{
    background:#eef4ff;
    border-left:4px solid #2563eb;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

    <div class="password-card">

        <div class="card-header-custom">

            <i class="fa-solid fa-lock fa-2x mb-2"></i>

            <h3>Change Password</h3>

            <p class="mb-0">
                Keep your account secure
            </p>

        </div>

        <div class="card-body-custom">

            <form action="/change-password"
                  method="post">

                <!-- CURRENT PASSWORD -->

                <div class="mb-3">

                    <label class="form-label">
                        Current Password
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="fa-solid fa-key"></i>
                        </span>

                        <input type="password"
                               id="currentPassword"
                               name="currentPassword"
                               class="form-control"
                               required>

                    </div>

                </div>

                <!-- NEW PASSWORD -->

                <div class="mb-3">

                    <label class="form-label">
                        New Password
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="fa-solid fa-lock"></i>
                        </span>

                        <input type="password"
                               id="newPassword"
                               name="newPassword"
                               class="form-control"
                               required>

                    </div>

                </div>

                <!-- CONFIRM PASSWORD -->

                <div class="mb-4">

                    <label class="form-label">
                        Confirm Password
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="fa-solid fa-shield-halved"></i>
                        </span>

                        <input type="password"
                               id="confirmPassword"
                               name="confirmPassword"
                               class="form-control"
                               required>

                    </div>

                </div>

                <button class="btn btn-save text-white w-100">

                    <i class="fa-solid fa-floppy-disk me-2"></i>

                    Update Password

                </button>

            </form>

            <!-- SECURITY TIPS -->

            <div class="security-box">

                <h6>
                    <i class="fa-solid fa-circle-info me-2"></i>
                    Security Tips
                </h6>

                <ul class="mb-0">

                    <li>Use at least 8 characters</li>

                    <li>Include uppercase and lowercase letters</li>

                    <li>Add numbers and special characters</li>

                    <li>Never share your password</li>

                </ul>

            </div>

            <!-- BACK BUTTON -->

            <div class="text-center mt-4">

                <a href="/dashboard"
                   class="btn btn-outline-secondary">

                    <i class="fa-solid fa-arrow-left me-2"></i>

                    Back to Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
