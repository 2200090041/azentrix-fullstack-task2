<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Tasks Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:#f4f7fc;
    font-family:'Segoe UI',sans-serif;
}

/* HEADER */

.page-header{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.stats-card{
    background:white;
    border-radius:16px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.stats-card:hover{
    transform:translateY(-4px);
    transition:.3s;
}

.search-box{
    border-radius:12px;
    padding:12px;
    margin-bottom:25px;
}

.task-card{
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    transition:.3s;
    height:100%;
}

.task-card:hover{
    transform:translateY(-4px);
}

.task-title{
    font-size:18px;
    font-weight:600;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
}

.status-todo{
    background:#dbeafe;
    color:#2563eb;
}

.status-progress{
    background:#fff7ed;
    color:#ea580c;
}

.status-done{
    background:#dcfce7;
    color:#16a34a;
}

.badge{
    padding:8px 12px;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->

    <div class="page-header">

        <div class="d-flex justify-content-between align-items-center">

            <div>

                <h2>
                    <i class="fa-solid fa-list-check"></i>
                    Tasks Management
                </h2>

                <p class="mb-0">
                    Track and manage all project tasks
                </p>

            </div>

            <a href="/dashboard"
               class="btn btn-light">

                <i class="fa-solid fa-arrow-left"></i>
                Dashboard

            </a>

        </div>

    </div>

    <!-- STATS -->

    <div class="row mb-4">

        <div class="col-md-4">
            <div class="stats-card">
                <h6>Total Tasks</h6>
                <h2 th:text="${#lists.size(tasks)}"></h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h6>Pending</h6>
                <h2 class="text-warning"
                    th:text="${tasks.?[status!='DONE'].size()}">
                </h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h6>Completed</h6>
                <h2 class="text-success"
                    th:text="${tasks.?[status=='DONE'].size()}">
                </h2>
            </div>
        </div>

    </div>

    <!-- SEARCH -->

    <input type="text"
           class="form-control search-box"
           placeholder="🔍 Search Tasks...">

    <!-- TASKS -->

    <div class="row g-4">

        <div class="col-md-4"
             th:each="task : ${tasks}">

            <div class="task-card">

                <div class="d-flex justify-content-between">

                    <div class="task-title"
                         th:text="${task.title}">
                    </div>

                    <span class="badge bg-dark">
                        Task
                    </span>

                </div>

                <p class="text-muted mt-2"
                   th:text="${task.description}">
                </p>

                <!-- PRIORITY -->

                <div class="mb-3">

                    <span class="badge bg-danger"
                          th:if="${task.priority=='HIGH'}">
                        HIGH
                    </span>

                    <span class="badge bg-warning text-dark"
                          th:if="${task.priority=='MEDIUM'}">
                        MEDIUM
                    </span>

                    <span class="badge bg-success"
                          th:if="${task.priority=='LOW'}">
                        LOW
                    </span>

                </div>

                <!-- STATUS -->

                <div class="mb-3">

                    <span class="badge status-todo"
                          th:if="${task.status=='TODO'}">
                        TODO
                    </span>

                    <span class="badge status-progress"
                          th:if="${task.status=='IN_PROGRESS'}">
                        IN PROGRESS
                    </span>

                    <span class="badge status-done"
                          th:if="${task.status=='DONE'}">
                        DONE
                    </span>

                </div>

                <!-- ASSIGNED USER -->

                <div class="d-flex align-items-center mb-3">

                    <div class="avatar">

                        <span th:text="${task.assignedUser != null ?
                        #strings.substring(task.assignedUser.name,0,1)
                        : 'U'}">
                        </span>

                    </div>

                    <div class="ms-2">

                        <small class="text-muted">
                            Assigned To
                        </small>

                        <div th:text="${task.assignedUser != null ?
                             task.assignedUser.name :
                             'Unassigned'}">
                        </div>

                    </div>

                </div>

                <!-- DUE DATE -->

                <small class="text-muted">

                    <i class="fa-solid fa-calendar"></i>

                    Due:
                    <span th:text="${task.dueDate}"></span>

                </small>

                <!-- ACTION BUTTONS -->

                <div class="mt-3">

                    <a th:href="@{/task/edit/{id}(id=${task.id})}"
                       class="btn btn-warning btn-sm">

                        <i class="fa-solid fa-pen"></i>
                        Edit

                    </a>

                    <form th:action="@{/task/delete/{id}(id=${task.id})}"
                          method="post"
                          style="display:inline;">

                        <button class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this task?')">

                            <i class="fa-solid fa-trash"></i>
                            Delete

                        </button>

                    </form>

                    <a th:href="@{/board/{id}(id=${task.board.id})}"
                       class="btn btn-primary btn-sm">

                        <i class="fa-solid fa-table-columns"></i>
                        Open Board

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

document.querySelector(".search-box")
.addEventListener("keyup", function(){

    let value = this.value.toLowerCase();

    document.querySelectorAll(".task-card")
    .forEach(card => {

        card.style.display =
            card.innerText.toLowerCase().includes(value)
            ? "block"
            : "none";

    });

});

</script>

</body>
</html>
